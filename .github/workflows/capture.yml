name: Capture First Folds Watch

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: first-folds-watch
  cancel-in-progress: false

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install playwright pillow
          python -m playwright install --with-deps chromium
      - name: Capture homepages
        run: python capture_all.py
      - name: Commit refreshed shots
        run: |
          git config user.name  "first-folds-bot"
          git config user.email "actions@github.com"
          git add shots
          git commit -m "Refresh screenshots [skip ci]" || echo "no changes"
          git push || echo "nothing to push"
